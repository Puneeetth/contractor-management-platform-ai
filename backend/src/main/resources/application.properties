spring.application.name=cmp-ai
spring.profiles.default=dev

jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-characters}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:10MB}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
app.swagger.contact-url=${APP_SWAGGER_CONTACT_URL:http://localhost:8080}
