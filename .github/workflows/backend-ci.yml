name: Backend CI

on:
  push: {}
  pull_request: {}

jobs:
  backend:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify